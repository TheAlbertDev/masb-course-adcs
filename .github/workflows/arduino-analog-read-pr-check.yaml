name: 🧪 Arduino analog read - PR check

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - edited

permissions:
  contents: read

jobs:
  unit_tests:
    name: ✅ Run Unit tests
    if: |
      !github.event.repository.is_template &&
      startsWith(github.head_ref, 'arduino/') && endsWith(github.head_ref, '/analog-read')
    runs-on: self-hosted
    steps:
      - name: 🛡️ Get GitHub App token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.THEALBERTDEVBOT_APP_ID }}
          private-key: ${{ secrets.THEALBERTDEVBOT_SECRET_KEY }}
          owner: ${{ github.repository_owner }}

      - name: 📥 Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: 🔍 Extract student username from branch name
        run: |
          echo "STUDENT_USERNAME=$(echo '${{ github.head_ref }}' | cut -d'/' -f2)" >> $GITHUB_ENV

      - name: 🧬 Run unit tests
        env:
          CPPUTEST_HOME: /opt/cpputest
        run: |
          cd ${{ github.workspace }}/.github/tests/unit/test_arduino_analog_read
          make
