name: 🧪 Arduino analog serial - PR check

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - edited

permissions:
  contents: read

jobs:
  acceptance_tests:
    name: ✅ Build and Run Acceptance tests
    if: |
      !github.event.repository.is_template &&
      startsWith(github.head_ref, 'arduino/') && endsWith(github.head_ref, '/analog-serial')
    runs-on: self-hosted
    steps:
      - name: 🛡️ Get GitHub App token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.THEALBERTDEVBOT_APP_ID }}
          private-key: ${{ secrets.THEALBERTDEVBOT_SECRET_KEY }}
          owner: ${{ github.repository_owner }}

      - name: 📥 Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: 🔍 Extract student username from branch name
        run: |
          echo "STUDENT_USERNAME=$(echo '${{ github.head_ref }}' | cut -d'/' -f2)" >> $GITHUB_ENV

      - name: 🏗️ Build and upload PlatformIO CLI project
        run: |
          cd ${{ github.workspace }}/arduino/workspace/${{ env.STUDENT_USERNAME }}/analog-serial
          pio run --target upload

      - name: 🧬 Run acceptance tests
        id: acceptance-tests
        run: |
          cd ${{ github.workspace }}/.github/tests/acceptance/test_arduino_analog_serial
          /usr/bin/python3 -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt
          python -m pytest -v

      - name: Upload charts as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analog-serial-analysis-charts
          path: artifacts/*.png
          if-no-files-found: warn
          retention-days: 30
