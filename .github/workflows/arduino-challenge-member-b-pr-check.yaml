name: 🧪 Arduino ADCs challenge (member B) - PR check

on:
  pull_request:
    branches:
      - arduino/develop
    types:
      - opened
      - synchronize
      - reopened
      - edited

permissions:
  contents: read

jobs:
  unit_tests:
    name: ✅ Run Unit tests
    if: |
      !github.event.repository.is_template &&
      github.head_ref == 'arduino/member-b'
    runs-on: self-hosted
    steps:
      - name: 🛡️ Get GitHub App token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.THEALBERTDEVBOT_APP_ID }}
          private-key: ${{ secrets.THEALBERTDEVBOT_SECRET_KEY }}
          owner: ${{ github.repository_owner }}

      - name: 📥 Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: 🧬 Run unit tests
        env:
          CPPUTEST_HOME: /opt/cpputest
        run: |
          cd ${{ github.workspace }}/.github/tests/unit/test_arduino_challenge_member_b
          make
